{% extends 'base.html' %}
{% block title %}Đăng nhập - Con Cưng{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <div style="font-size:3rem;">🐾</div>
                        <h4 class="fw-bold">Đăng nhập</h4>
                        <p class="text-muted">Chào mừng trở lại!</p>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                            <div class="text-danger small">{{ field.errors.0 }}</div>
                            {% endif %}
                        </div>
                        {% endfor %}
                        <button type="submit" class="btn btn-chinh w-100 py-2 fw-bold">
                            <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
                        </button>
                    </form>
                    <hr>
                    <div class="text-center">
                        <span class="text-muted">Chưa có tài khoản?</span>
                        <a href="{% url 'dang_ky' %}" class="fw-bold ms-1">Đăng ký ngay</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
