{% extends 'base.html' %}
{% block title %}Đổi mật khẩu thành công - Con Cưng{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 text-center">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-5">
                    <div style="font-size:4rem;" class="text-success mb-3">✅</div>
                    <h4 class="fw-bold mb-3">Hoàn tất!</h4>
                    <p class="text-muted mb-4">
                        Mật khẩu của bạn đã được thay đổi thành công. 
                        Bây giờ bạn có thể đăng nhập bằng mật khẩu mới.
                    </p>
                    <a href="{% url 'dang_nhap' %}" class="btn btn-chinh w-100 py-2 fw-bold">
                        Đăng nhập ngay
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
